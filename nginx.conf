worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    server {
        listen       80;
        server_name  localhost;

        # Point to the built app — adjust path to your actual dist folder
        root "C:/Users/icy/Desktop/test1/arkila-web/dist";
        index index.html;

        # SPA fallback: all routes serve index.html so React Router works
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets aggressively (they have hashed filenames from Vite)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Disable caching for index.html so updates are picked up immediately
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        error_page 500 502 503 504 /index.html;
    }
}
